<!DOCTYPE html>
<html lang="fi">
<head>  
  <meta charset="UTF-8">
  <title>Viljelymuisti</title>
</head>
<body>
  <h1>Viljelymuisti</h1>
  <p>Ensimmäinen oma viljelyohjelma toimii.</p>

  <input type="file" id="tiedosto" accept=".geojson,.json">
  <div id="lohkoTiedot"></div>
  <h2>Lohkot</h2>
  <u1 id="lohkolista"></u1>

  <script>
    const tiedosto = document.getElementById("tiedosto");
    const lohkolista = document.getElementById("lohkolista");

    tiedosto.addEventListener("change", function () {
      const file = tiedosto.files[0];
      const reader = new FileReader();

      reader.onload = function () {
        const geojson = JSON.parse(reader.result);
        lohkolista.innerHTML = "";

        geojson.features.forEach(function (lohko) {
          const nimi =
            lohko.properties.Nimi ||
            lohko.properties.nimi ||
            lohko.properties.name ||
            "nimetön lohko";

          const rivi = document.createElement("li");
         rivi.innerHTML = `
<div style="border:1px solid #ccc; padding:10px; margin:10px 0; border-radius:8px;">
<h3>${nimi}</h3>
<p><b>Pinta-ala:</b> ${lohko.properties.ala} ha</p>
<p><b>Tunnus:</b> ${lohko.properties.pltunnus}</p>
<button onclick="avaaLohko('${JSON.stringify(nimi)})'>Muistiinpanot</button>
</div>
`;

lohkolista.appendChild(rivi);
        });
      };

      reader.readAsText(file);
    });
    
function avaaLohko(nimi) {
const lohkoTiedot = document.getElementById("lohkoTiedot");

lohkoTiedot.innerHTML = `
<div style="border:2px solid green; padding:15px; margin:15px 0; border-radius:10px;">
<h2>${nimi}</h2>

<p><b>Päivämäärä</b</p>
<input type="date">

<p><b>Toimenpide</b></p>
<select>
 <option>Istutus</option>
  <option>Multaus</option>
  <option>Rikkaruiskutus</option>
  <option>Tautiruiskutus</option>
  <option>Kastelu</option>
  <option>Nosto</option>
</select>
<p><b>Muistiinpano</b></p>
<textarea id="muistiinpano" rows="8" style="width:100%; margin-top:10px;"></textarea>

<br><br>

<button onclick="tallennaMuistiinpano(´${nimi}´)">
Tallenna
</button>

</div>
`;


  lohkoTiedot.scrollIntoView({
    behavior: "smooth"
});

}
function tallennaMuistiinpano(nimi) {
const teksti = document.getElementById("muistiinpano").value;

localStorage.setItem(nimi, teksti);

alert("Muistiinpano tallenettu!");
}

  </script>
</body>
</html>
