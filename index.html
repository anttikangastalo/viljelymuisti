<!DOCTYPE html>
<html lang="fi">
<head>  
  <meta charset="UTF-8">
  <title>Viljelymuisti</title>
</head>
<body>
  <h1>viljelymuisti</h1>
  <p>Ensimmäinen oma viljelyohjelma toimii.</p>

  <input type="file" id="tiedosto" accept=".geojson,.json">
  <div id="lohkoTiedot"></div>
  <h2>Lohkot</h2>
  <u1 id="lohkolista"></u1>

  <script>
    const tiedosto = document.getElementById("tiedosto");
    const lohkolista = document.getElementById("lohkolista");

    tiedosto.addEventListener("change", function () {
      const file = tiedosto.files[0];
      const reader = new FileReader();

      reader.onload = function () {
        const geojson = JSON.parse(reader.result);
        lohkolista.innerHTML = "";

        geojson.features.forEach(function (lohko) {
          const nimi =
            lohko.properties.Nimi ||
            lohko.properties.nimi ||
            lohko.properties.name ||
            "nimetön lohko";

          const rivi = document.createElement("li");
         rivi.innerHTML = `
<div style="border:1px solid #ccc; padding:10px; margin:10px 0; border-radius:8px;">
<h3>${nimi}</h3>
<p><b>Pinta-ala:</b> ${lohko.properties.ala} ha</p>
<p><b>Tunnus:</b> ${lohko.properties.pltunnus}</p>
<button onclick="avaaLohko('${nimi}')">Muistiinpanot</button>
</div>
`;

lohkolista.appendChild(rivi);
        });
      };

      reader.readAsText(file);
    });
    
  function avaaLohko(nimi) {
    alert("Avasit lohkon: " + nimi);
}
  </script>
</body>
</html>
